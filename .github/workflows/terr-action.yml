name: Build and Deploy to S3
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 레파지토리 ubuntu 연동
      - name: Checkout code
        uses: actions/checkout@v3
      # JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      # 배포 WAR 파일 생성
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build # test없이 배포. test 할시 DB 연결 실패 오류
        run: ./gradlew clean build -x test
      - name: Check build output
        run: |
          ls -al build/libs
      # WAR 파일을 ZIP 파일로 묶기
      - name: Package WAR into ZIP
        run: |
          mkdir -p package
          cp build/libs/*-SNAPSHOT.war package/ROOT.war
          cp appspec.yml package/appspec.yml
          zip -r spring-app.zip package/
      # S3 자격증명 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.S3_ACC_KEY }}
          aws-secret-access-key: ${{ secrets.S3_SEC_KEY }}
          aws-region: ${{ secrets.S3_REGION }}
      # ZIP 파일을 S3에 업로드
      - name: Upload to S3
        run: aws s3 cp spring-app.zip s3://${{ secrets.S3_BUCKET_NAME }}/spring-app.zip
      # CodeDeploy 실행 (EC2에 배포)
      - name: Deploy to EC2 using CodeDeploy
        run: aws deploy create-deployment
          --application-name "$CODE_DEPLOY_APP_NAME"
          --deployment-group-name "$DEPLOYMENT_GROUP_NAME"
          --s3-location bucket=${{ secrets.S3_BUCKET_NAME }},key=spring-app.zip,bundleType=zip
          --region ${{ secrets.S3_REGION }}
env:
  CODE_DEPLOY_APP_NAME: code-deploy-test
  DEPLOYMENT_GROUP_NAME: spring-app-deploy-group